# DaemonSet: amdgpu-driver-patch
# Pod = two run-to-completion init containers + an idle busybox "pause" main.
#   init 1 "driver-patch"  (PRIVILEGED, hostPID): patch + dkms + initramfs + reboot,
#                          re-entrant reboot-loop; exits 0 only after dmesg verify.
#   init 2 "set-condition" (UNPRIVILEGED): host kubectl + pod SA token sets
#                          AMDGPUDriverPatched=True. Runs only if init 1 exits 0.
#   main "pause"           (UNPRIVILEGED): sleep infinity so the pod stays Running.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amdgpu-driver-patch
  namespace: kube-system
  labels:
    app: amdgpu-driver-patch
spec:
  selector:
    matchLabels:
      app: amdgpu-driver-patch
  template:
    metadata:
      labels:
        app: amdgpu-driver-patch
    spec:
      serviceAccountName: amdgpu-driver-patch
      # init 1 reaches host PID 1 via nsenter; hostPID is a pod-level field.
      hostPID: true
      nodeSelector:
        doks.digitalocean.com/gpu-brand: amd
      tolerations:
        # device taint on every AMD GPU node
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
        # NRC readiness taint applied while the node is gated
        - key: readiness.k8s.io/amd-gpu-driver-not-ready
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: patch
          configMap:
            name: amdgpu-patch-files
        - name: scripts
          configMap:
            name: amdgpu-patch-scripts
            defaultMode: 0755
        # Host kubectl binary, mounted read-only so init 2 execs it directly
        # (no nsenter) while staying unprivileged. /usr/bin/kubectl on this image.
        - name: host-kubectl
          hostPath:
            path: /usr/bin/kubectl
            type: File
      initContainers:
        # ---- init 1: PRIVILEGED driver patch + reboot loop ----
        - name: driver-patch
          image: debian:stable-slim
          command: ["bash", "/scripts/init1-driver-patch.sh"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: patch
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
        # ---- init 2: UNPRIVILEGED set node condition ----
        - name: set-condition
          image: debian:stable-slim
          command: ["bash", "/scripts/init2-set-condition.sh"]
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: host-kubectl
              mountPath: /host/usr/bin/kubectl
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      # ---- main: UNPRIVILEGED idle pause ----
      containers:
        - name: pause
          image: busybox:1.36
          command: ["sleep", "infinity"]
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
