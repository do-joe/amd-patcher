# DaemonSet: amdgpu-driver-patch  — LABEL variant (no NRC)
# Opt-in: schedules ONLY on AMD GPU nodes labeled
#   amd.com/gpu-driver-patch-enabled=true (see nodeSelector below). Applying this
#   manifest reboots nothing until you label a node; un-labeled nodes are never
#   patched or rebooted. init 2 still writes amd.com/gpu-driver-patched=true after
#   a verified patch — that output label is what workloads gate on.
# Pod = two run-to-completion init containers + an idle busybox "pause" main.
#   init 1 "driver-patch"  (PRIVILEGED, hostPID): extract pre-compiled modules +
#                          sha256 verify + depmod + initramfs + reboot, re-entrant
#                          reboot-loop; exits 0 only after post-reboot verify. In
#                          the post-reboot phase it also re-runs the host's
#                          /var/lib/cloud/scripts/peering.sh (via nsenter) to
#                          re-add the VPC peering routes the reboot wipes.
#   init 2 "label-node"    (UNPRIVILEGED): host kubectl + pod SA token labels the
#                          node amd.com/gpu-driver-patched=true. Runs only if
#                          init 1 exits 0.
#   main "pause"           (UNPRIVILEGED): sleep infinity so the pod stays Running.
#
# The patch payload + both scripts are baked into the image; the only host mount
# is the host kubectl binary for init 2. The image is private GHCR, pulled via
# the imperatively-created `ghcr-pull` secret.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amdgpu-driver-patch
  namespace: kube-system
  labels:
    app: amdgpu-driver-patch
spec:
  selector:
    matchLabels:
      app: amdgpu-driver-patch
  template:
    metadata:
      labels:
        app: amdgpu-driver-patch
    spec:
      serviceAccountName: amdgpu-driver-patch
      # init 1 reaches host PID 1 via nsenter; hostPID is a pod-level field.
      hostPID: true
      nodeSelector:
        doks.digitalocean.com/gpu-brand: amd
        # opt-in gate: the pod schedules (and patches + reboots) ONLY on AMD GPU
        # nodes an admin has explicitly labeled. Applying this DaemonSet is inert
        # until a node is labeled amd.com/gpu-driver-patch-enabled=true.
        amd.com/gpu-driver-patch-enabled: "true"
      # UPDATE THIS to the pull secret for the registry where the image lives.
      # `ghcr-pull` is the short-lived GHCR secret used for test only; when the
      # image is moved to the customer's registry (e.g. DOCR), point this at that
      # registry's pull secret — or remove imagePullSecrets entirely if DOKS
      # provides DOCR pull credentials natively.
      imagePullSecrets:
        - name: ghcr-pull
      tolerations:
        # device taint on every AMD GPU node
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
      volumes:
        # Host kubectl binary, mounted read-only so init 2 execs it directly
        # (no nsenter) while staying unprivileged. /usr/bin/kubectl on this image.
        - name: host-kubectl
          hostPath:
            path: /usr/bin/kubectl
            type: File
      initContainers:
        # ---- init 1: PRIVILEGED driver patch + reboot loop ----
        - name: driver-patch
          image: ghcr.io/do-solutions/amdgpu-driver-patch:6.12.74-deb13-1-amd64
          command: ["bash", "/opt/amdgpu-patch/scripts/init1-driver-patch.sh"]
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
        # ---- init 2: UNPRIVILEGED label node ----
        - name: label-node
          image: ghcr.io/do-solutions/amdgpu-driver-patch:6.12.74-deb13-1-amd64
          command: ["bash", "/opt/amdgpu-patch/scripts/init2-label-node.sh"]
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-kubectl
              mountPath: /host/usr/bin/kubectl
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      # ---- main: UNPRIVILEGED idle pause ----
      containers:
        - name: pause
          image: busybox:1.36
          command: ["sleep", "infinity"]
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
